version: '3'

services:
  app:
    build: ./app
    container_name: node_app
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app